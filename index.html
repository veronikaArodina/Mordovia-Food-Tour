        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            document.querySelectorAll('.dropdown-menu').forEach(function(d) {
                if (d.id !== id) d.classList.remove('show');
            });
            dropdown.classList.toggle('show');
        }

        document.getElementById('rating-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleDropdown('rating-dropdown');
        });
        document.getElementById('price-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleDropdown('price-dropdown');
        });
        document.getElementById('location-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleDropdown('location-dropdown');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown-menu') && !e.target.closest('.filter-button')) {
                document.querySelectorAll('.dropdown-menu').forEach(function(d) {
                    d.classList.remove('show');
                });
            }
        });

        const ratingStars = document.querySelectorAll('#rating-stars .star');
        const ratingBtn = document.getElementById('rating-btn');
        const ratingText = document.getElementById('rating-text');

        ratingStars.forEach(function(star) {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.rating);
                ratingStars.forEach(function(s) {
                    s.classList.toggle('active', parseInt(s.dataset.rating) <= selectedRating);
                });
                ratingText.textContent = 'от ' + selectedRating + ' звёзд';
                ratingBtn.classList.add('has-value');
            });
        });

        const priceSlider = document.getElementById('price-slider');
        const priceValue = document.getElementById('price-value');
        const priceBtn = document.getElementById('price-btn');

        function updateSliderBackground() {
            if (!priceSlider) return;
            const pct = (maxPrice - 500) / (25000 - 500) * 100;
            priceSlider.style.background = 'linear-gradient(to right, #6c1a30 0%, #6c1a30 ' + pct + '%, #e8dbd3 ' + pct + '%, #e8dbd3 100%)';
        }

        if (priceSlider) {
            priceSlider.addEventListener('input', function() {
                maxPrice = parseInt(this.value);
                priceValue.textContent = 'до ' + maxPrice.toLocaleString() + ' ₽';
                updateSliderBackground();
                priceBtn.classList.add('has-value');
            });
        }

        const customPriceCheckbox = document.getElementById('custom-price-checkbox');
        if (customPriceCheckbox) {
            customPriceCheckbox.addEventListener('change', function() {
                customPriceOnly = this.checked;
                if (priceSlider) priceSlider.disabled = this.checked;
                if (priceValue) priceValue.textContent = this.checked ? 'Индивидуальная цена' : 'до ' + maxPrice.toLocaleString() + ' ₽';
                priceBtn.classList.add('has-value');
            });
        }

        updateSliderBackground();

        function reflowGrid(visibleGrid, hiddenGrid) {
            const vg = document.getElementById(visibleGrid);
            const hg = document.getElementById(hiddenGrid);
            if (!vg || !hg) return;
            const allVisible = [];
            const allHidden = [];
            vg.querySelectorAll('.simple-card:not(.filtered-out)').forEach(function(c) { allVisible.push(c); });
            hg.querySelectorAll('.simple-card:not(.filtered-out)').forEach(function(c) { allVisible.push(c); });
            vg.querySelectorAll('.simple-card.filtered-out').forEach(function(c) { allHidden.push(c); });
            hg.querySelectorAll('.simple-card.filtered-out').forEach(function(c) { allHidden.push(c); });
            vg.innerHTML = '';
            hg.innerHTML = '';
            allVisible.forEach(function(card, index) {
                if (index < 4) { vg.appendChild(card); } else { hg.appendChild(card); }
            });
            allHidden.forEach(function(card) { hg.appendChild(card); });
            const showMoreBtn = document.getElementById(visibleGrid.replace('visible-grid', 'show-more'));
            if (showMoreBtn) {
                showMoreBtn.style.display = allVisible.length <= 4 ? 'none' : 'flex';
                if (allVisible.length <= 4) hg.classList.remove('show');
            }
        }

        function applyFilters() {
            selectedLocations = [];
            document.querySelectorAll('#location-list input:checked').forEach(function(cb) {
                selectedLocations.push(cb.value);
            });
            document.getElementById('location-btn').classList.toggle('has-value', selectedLocations.length > 0);
            document.querySelectorAll('.simple-card[data-rating]').forEach(function(card) {
                const r = parseFloat(card.dataset.rating);
                const p = parseInt(card.dataset.price);
                const loc = card.dataset.location;
                const isCustom = p === 0;
                let show = true;
                if (selectedRating !== null && r < selectedRating) show = false;
                if (customPriceOnly && !isCustom) show = false;
                if (!customPriceOnly && !isCustom && p > maxPrice) show = false;
                if (selectedLocations.length > 0 && !selectedLocations.includes(loc)) show = false;
                card.classList.toggle('filtered-out', !show);
            });
            reflowGrid('gastro-visible-grid', 'gastro-hidden-cards');
            reflowGrid('places-visible-grid', 'places-hidden-cards');
            reflowGrid('fest-visible-grid', 'fest-hidden-cards');
            updateCounts();
            document.querySelectorAll('.dropdown-menu').forEach(function(d) { d.classList.remove('show'); });
        }

        function resetFilters() {
            selectedRating = null;
            maxPrice = 25000;
            customPriceOnly = false;
            selectedLocations = [];
            ratingStars.forEach(function(s) { s.classList.remove('active'); });
            if (ratingText) ratingText.textContent = 'Выберите рейтинг';
            ratingBtn.classList.remove('has-value');
            if (priceSlider) {
                priceSlider.value = 25000;
                priceSlider.disabled = false;
            }
            if (priceValue) priceValue.textContent = 'до 25 000 ₽';
            updateSliderBackground();
            if (customPriceCheckbox) customPriceCheckbox.checked = false;
            priceBtn.classList.remove('has-value');
            document.querySelectorAll('#location-list input').forEach(function(cb) { cb.checked = false; });
            document.getElementById('location-btn').classList.remove('has-value');
            document.querySelectorAll('.simple-card[data-rating]').forEach(function(c) {
                c.classList.remove('filtered-out');
            });
            resetGrid('gastro-visible-grid', 'gastro-hidden-cards', gastroTours);
            resetGrid('places-visible-grid', 'places-hidden-cards', places);
            resetGrid('fest-visible-grid', 'fest-hidden-cards', festivals);
            updateCounts();
        }

        function resetGrid(visibleGridId, hiddenGridId, data) {

            const allCards = [];

        }

        function updateCounts() {
            function cv(s) {
                const cards = document.querySelectorAll(s);
                let count = 0;
                cards.forEach(function(c) { if (!c.classList.contains('filtered-out')) count++; });

            const gastroVisible = cv('#gastro-visible-grid .simple-card') + cv('#gastro-hidden-cards .simple-card');

function renderCard(item, clickHandler, isRecipe) {
    const card = document.createElement('div');
    card.className = 'simple-card';
    // Всегда добавляем обработчик клика
    if (clickHandler) {
        card.addEventListener('click', function() { clickHandler(item); });
    }
    let imgSrc = item.images ? item.images[0] : item.img;
    if (isRecipe) {
        card.innerHTML = '<div class="card-img" style="background-image: url(\'' + imgSrc + '\');"></div><div class="card-content"><div class="card-title">' + item.title + '</div></div>';
    } else {
                card.innerHTML = '<div class="card-img" style="background-image: url(\'' + imgSrc + '\');"></div><div class="card-content"><div class="rating-badge"><span class="stars">' + generateStars(item.rating) + '</span><span class="rating-number">' + item.rating + '</span><span class="reviews-count">' + item.reviews + ' отзывов</span></div><div class="card-title">' + item.title + '</div><div class="card-location"><i class="fas fa-map-marker-alt"></i> ' + item.location + '</div><div class="card-price">' + (item.price === 0 ? 'Индивидуальная цена' : 'от ' + item.price.toLocaleString() + ' ₽') + '</div></div>';
                card.dataset.rating = item.rating;
                card.dataset.price = item.price;
                card.dataset.location = item.location;
            }
            return card;
        }

function openDetailWindow(item) {

    const contact = item.customContact || {};
    const reviews = getRandomReviews();
    const isRecipe = (!item.reviews || item.reviews === 0) && (item.price === 0);

    function formatLine(line, isRecipe) {
        if (typeof line === 'string') line = { text: line };
        if (!line.text && !line.html) return '';
        if (line.html) return '<div style="margin-bottom:8px;">' + line.html + '</div>';
        
        const b = line.bullet ? '<span style="color:#c62828;font-weight:bold;margin-right:8px;">•</span>' : '';
        const align = line.align || 'left';
        const fontSize = line.fontSize || '1rem';
        const color = line.color || '#2c3e50';
        const bold = line.bold ? 'font-weight:bold;' : '';
        const marginBottom = line.bold ? '12px' : '6px';
        
        // Поддержка marginLeft
        let marginLeft = 0;
        if (line.marginLeft) marginLeft = line.marginLeft;
        else if (line.indent) marginLeft = line.indent;
        
        if (isRecipe) {
            return '<p style="padding-left:' + marginLeft + 'px;text-align:' + align + ';font-size:' + fontSize + ';color:' + color + ';' + bold + ';margin-bottom:' + marginBottom + ';line-height:1.8;">' + b + (line.text || '') + '</p>';
        }
        return '<div style="padding-left:' + marginLeft + 'px;text-align:' + align + ';font-size:' + fontSize + ';color:' + color + ';' + bold + ';margin-bottom:' + marginBottom + ';">' + b + (line.text || '') + '</div>';
    }

    // Разделяем контент для рецептов по слову "Ингредиенты"
    let ingredientsHTML = '';
    let cookingHTML = '';
    let descriptionHTML = '';

            // Как только встречаем "Приготовление" — переключаемся
            if (text.includes('Приготовление:')) {
                foundCooking = true;
                cookingHTML += formatLine(line, true);
            } else if (!foundCooking) {
                // Всё до "Приготовление" — это ингредиенты
                ingredientsHTML += formatLine(line, true);
            } else {
                // Всё после "Приготовление" — это шаги приготовления

function getCarouselScript(totalSlides) {
    // Если только одно изображение (рецепт), не добавляем скрипт карусели
    const carouselScript = totalSlides > 1 ? 
        "let currentSlide=0;const totalSlides=" + totalSlides + ";const slides=document.getElementById('carousel-slides');const dots=document.querySelectorAll('.cd');const counter=document.getElementById('carousel-counter');function updateCarousel(){slides.style.transform='translateX(-'+(currentSlide*100)+'%)';dots.forEach(function(d,i){d.classList.toggle('a',i===currentSlide)});counter.textContent=(currentSlide+1)+' / '+totalSlides}function changeSlide(d){currentSlide+=d;if(currentSlide>=totalSlides)currentSlide=0;if(currentSlide<0)currentSlide=totalSlides-1;updateCarousel()}function goToSlide(i){currentSlide=i;updateCarousel()}setInterval(function(){changeSlide(1)},5000);let touchStartX=0;slides.addEventListener('touchstart',function(e){touchStartX=e.changedTouches[0].screenX});slides.addEventListener('touchend',function(e){const diff=touchStartX-e.changedTouches[0].screenX;if(Math.abs(diff)>50)changeSlide(diff>0?1:-1)});document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')changeSlide(-1);if(e.key==='ArrowRight')changeSlide(1)});" : "";

    return carouselScript + "let selectedReviewRating=0;document.querySelectorAll('.si').forEach(function(s){s.addEventListener('click',function(){selectedReviewRating=parseInt(this.dataset.rating);document.querySelectorAll('.si').forEach(function(st,i){st.textContent=i<selectedReviewRating?'★':'☆';st.classList.toggle('a',i<selectedReviewRating)})})});function submitReview(){const text=document.querySelector('.rt').value;if(!text.trim()){alert('Напишите отзыв!');return}if(selectedReviewRating===0){alert('Поставьте оценку!');return}const reviewsList=document.querySelector('.rvl');const starsHTML='★'.repeat(selectedReviewRating)+'☆'.repeat(5-selectedReviewRating);reviewsList.insertAdjacentHTML('afterbegin','<div class=\"rv\"><div class=\"rv-h\"><span class=\"rv-n\">Вы</span><span class=\"rv-s\">'+starsHTML+'</span></div><p>'+text+'</p></div>');document.querySelector('.rt').value='';selectedReviewRating=0;document.querySelectorAll('.si').forEach(function(s){s.textContent='☆';s.classList.remove('a')})}";
}        

function fillSection(vg, hg, data, isRecipe) {
    const v = document.getElementById(vg);
    const h = document.getElementById(hg);
    if (!v || !h) return;
    // Используем openDetailWindow для всех разделов
    const handler = openDetailWindow;
    data.forEach(function(item, i) {
        const card = renderCard(item, handler, isRecipe);
        if (i < 4) {
            v.appendChild(card);
        } else {
            h.appendChild(card);
        }
    });
}
        fillSection('gastro-visible-grid', 'gastro-hidden-cards', gastroTours, false);
        fillSection('places-visible-grid', 'places-hidden-cards', places, false);
        fillSection('fest-visible-grid', 'fest-hidden-cards', festivals, false);
        fillSection('recipes-visible-grid', 'recipes-hidden-cards', recipes, true);

        function setupShowMore(b, h) {
            const btn = document.getElementById(b);
            const hid = document.getElementById(h);
            if (!btn || !hid) return;
            const sp = btn.querySelector('span');
            const ot = sp.textContent;
            btn.addEventListener('click', function() {
                hid.classList.toggle('show');
                btn.classList.toggle('expanded');
                sp.textContent = hid.classList.contains('show') ? 'Скрыть' : ot;
            });
        }

        setupShowMore('gastro-show-more', 'gastro-hidden-cards');
        setupShowMore('places-show-more', 'places-hidden-cards');
        setupShowMore('fest-show-more', 'fest-hidden-cards');
        setupShowMore('recipes-show-more', 'recipes-hidden-cards');

        updateCounts();

        const navItems = document.querySelectorAll('.nav-item');
        const sections = {
            gastro: document.getElementById('gastro'),
            places: document.getElementById('places'),
            fest: document.getElementById('fest'),
            recipes: document.getElementById('recipes')
        };

        navItems.forEach(function(item) {
            item.addEventListener('click', function() {
                const id = this.dataset.section;
                if (sections[id]) {
                    sections[id].scrollIntoView({ behavior: 'smooth' });
                    navItems.forEach(function(i) {
                        i.classList.toggle('active', i.dataset.section === id);
                    });
                }
            });
        });

        const obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    navItems.forEach(function(i) {
                        i.classList.toggle('active', i.dataset.section === entry.target.id);
                    });
                }
            });
        }, { threshold: 0.3 });

        Object.values(sections).forEach(function(section) {
            if (section) obs.observe(section);
        });
    })();
    </script>
