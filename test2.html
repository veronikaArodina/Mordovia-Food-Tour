        let selectedRating = null;
        let maxPrice = 25000;
        let customPriceOnly = false;
        let selectedLocations = [];

        const locationList = document.getElementById('location-list');
        locations.forEach(function(loc) {
            const div = document.createElement('div');
            div.className = 'location-item';
            div.innerHTML = `<input type="checkbox" id="loc-${loc}" value="${loc}"><label for="loc-${loc}">${loc}</label>`;
            div.addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') { const cb = this.querySelector('input'); cb.checked = !cb.checked; }
            });
            locationList.appendChild(div);
        });

        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            document.querySelectorAll('.dropdown-menu').forEach(function(d) { if (d.id !== id) d.classList.remove('show'); });
            dropdown.classList.toggle('show');
        }

        document.getElementById('rating-btn').addEventListener('click', function(e) { e.stopPropagation(); toggleDropdown('rating-dropdown'); });
        document.getElementById('price-btn').addEventListener('click', function(e) { e.stopPropagation(); toggleDropdown('price-dropdown'); });
        document.getElementById('location-btn').addEventListener('click', function(e) { e.stopPropagation(); toggleDropdown('location-dropdown'); });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown-menu') && !e.target.closest('.filter-button')) {
                document.querySelectorAll('.dropdown-menu').forEach(function(d) { d.classList.remove('show'); });
            }
        });

        const ratingStars = document.querySelectorAll('#rating-stars .star');
        const ratingBtn = document.getElementById('rating-btn');
        const ratingText = document.getElementById('rating-text');

        ratingStars.forEach(function(star) {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.rating);
                ratingStars.forEach(function(s) { s.classList.toggle('active', parseInt(s.dataset.rating) <= selectedRating); });
                ratingText.textContent = 'от ' + selectedRating + ' звёзд';
                ratingBtn.classList.add('has-value');
            });
        });

        const priceSlider = document.getElementById('price-slider');
        const priceValue = document.getElementById('price-value');
        const priceBtn = document.getElementById('price-btn');

        function updateSliderBackground() {
            const pct = (maxPrice - 500) / (25000 - 500) * 100;
            priceSlider.style.background = `linear-gradient(to right, #6c1a30 0%, #6c1a30 ${pct}%, #e8dbd3 ${pct}%, #e8dbd3 100%)`;
        }

        priceSlider.addEventListener('input', function() {
            maxPrice = parseInt(this.value);
            priceValue.textContent = 'до ' + maxPrice.toLocaleString() + ' ₽';
            updateSliderBackground();
            priceBtn.classList.add('has-value');
        });

        document.getElementById('custom-price-checkbox').addEventListener('change', function() {
            customPriceOnly = this.checked;
            priceSlider.disabled = this.checked;
            priceValue.textContent = this.checked ? 'Индивидуальная цена' : 'до ' + maxPrice.toLocaleString() + ' ₽';
            priceBtn.classList.add('has-value');
        });

        updateSliderBackground();

        function reflowGrid(visibleGrid, hiddenGrid) {
            const vg = document.getElementById(visibleGrid);
            const hg = document.getElementById(hiddenGrid);
            const allVisible = [];
            const allHidden = [];
            vg.querySelectorAll('.simple-card:not(.filtered-out)').forEach(c => allVisible.push(c));
            hg.querySelectorAll('.simple-card:not(.filtered-out)').forEach(c => allVisible.push(c));
            vg.querySelectorAll('.simple-card.filtered-out').forEach(c => allHidden.push(c));
            hg.querySelectorAll('.simple-card.filtered-out').forEach(c => allHidden.push(c));
            vg.innerHTML = '';
            hg.innerHTML = '';
            allVisible.forEach(function(card, index) {
                if (index < 4) { vg.appendChild(card); } else { hg.appendChild(card); }
            });
            allHidden.forEach(function(card) { hg.appendChild(card); });
            const showMoreBtn = document.getElementById(visibleGrid.replace('visible-grid', 'show-more'));
            if (showMoreBtn) {
                showMoreBtn.style.display = allVisible.length <= 4 ? 'none' : 'flex';
                if (allVisible.length <= 4) hg.classList.remove('show');
            }
        }

        function applyFilters() {
            selectedLocations = [];
            document.querySelectorAll('#location-list input:checked').forEach(function(cb) { selectedLocations.push(cb.value); });
            document.getElementById('location-btn').classList.toggle('has-value', selectedLocations.length > 0);
            document.querySelectorAll('.simple-card[data-rating]').forEach(function(card) {
                const r = parseFloat(card.dataset.rating), p = parseInt(card.dataset.price), loc = card.dataset.location, isCustom = p === 0;
                let show = true;
                if (selectedRating !== null && r < selectedRating) show = false;
                if (customPriceOnly && !isCustom) show = false;
                if (!customPriceOnly && !isCustom && p > maxPrice) show = false;
                if (selectedLocations.length > 0 && !selectedLocations.includes(loc)) show = false;
                card.classList.toggle('filtered-out', !show);
            });
            reflowGrid('gastro-visible-grid', 'gastro-hidden-cards');
            reflowGrid('places-visible-grid', 'places-hidden-cards');
            reflowGrid('fest-visible-grid', 'fest-hidden-cards');
            updateCounts();
            document.querySelectorAll('.dropdown-menu').forEach(function(d) { d.classList.remove('show'); });
        }

        function resetFilters() {
            selectedRating = null; maxPrice = 25000; customPriceOnly = false; selectedLocations = [];
            ratingStars.forEach(function(s) { s.classList.remove('active'); });
            ratingText.textContent = 'Выберите рейтинг'; ratingBtn.classList.remove('has-value');
            priceSlider.value = 25000; priceSlider.disabled = false;
            priceValue.textContent = 'до 25 000 ₽'; updateSliderBackground();
            document.getElementById('custom-price-checkbox').checked = false; priceBtn.classList.remove('has-value');
            document.querySelectorAll('#location-list input').forEach(function(cb) { cb.checked = false; });
            document.getElementById('location-btn').classList.remove('has-value');
            document.querySelectorAll('.simple-card[data-rating]').forEach(function(c) { c.classList.remove('filtered-out'); });
            resetGrid('gastro-visible-grid', 'gastro-hidden-cards', gastroTours);
            resetGrid('places-visible-grid', 'places-hidden-cards', places);
            resetGrid('fest-visible-grid', 'fest-hidden-cards', festivals);
            updateCounts();
        }

        function resetGrid(visibleGridId, hiddenGridId, data) {
            const vg = document.getElementById(visibleGridId), hg = document.getElementById(hiddenGridId);
            const allCards = [];
            vg.querySelectorAll('.simple-card').forEach(c => allCards.push(c));
            hg.querySelectorAll('.simple-card').forEach(c => allCards.push(c));
            vg.innerHTML = ''; hg.innerHTML = '';
            allCards.forEach(function(card, index) {
                if (index < 4) { vg.appendChild(card); } else { hg.appendChild(card); }
            });
            const showMoreBtn = document.getElementById(visibleGridId.replace('visible-grid', 'show-more'));
            if (showMoreBtn) showMoreBtn.style.display = allCards.length > 4 ? 'flex' : 'none';
        }

        function updateCounts() {
            function cv(s) { return document.querySelectorAll(s).length - document.querySelectorAll(s + '.filtered-out').length; }
            document.getElementById('results-count').textContent = cv('#gastro-visible-grid .simple-card') + cv('#gastro-hidden-cards .simple-card') + ' / ' + gastroTours.length + ' предложений';
            document.getElementById('places-count').textContent = cv('#places-visible-grid .simple-card') + cv('#places-hidden-cards .simple-card') + ' / ' + places.length + ' мест';
            document.getElementById('fest-count').textContent = cv('#fest-visible-grid .simple-card') + cv('#fest-hidden-cards .simple-card') + ' / ' + festivals.length + ' событий';
        }

        document.getElementById('apply-filters').addEventListener('click', applyFilters);
        document.getElementById('reset-filters').addEventListener('click', resetFilters);

        function renderCard(item, clickHandler, isRecipe) {
            const card = document.createElement('div');
            card.className = 'simple-card';
            if (clickHandler) card.addEventListener('click', function() { clickHandler(item); });
            let imgSrc = item.images ? item.images[0] : item.img;
            if (isRecipe) {
                card.innerHTML = `<div class="card-img" style="background-image: url('${imgSrc}');"></div><div class="card-content"><div class="card-title">${item.title}</div></div>`;
            } else {
                card.innerHTML = `<div class="card-img" style="background-image: url('${imgSrc}');"></div><div class="card-content"><div class="rating-badge"><span class="stars">${generateStars(item.rating)}</span><span class="rating-number">${item.rating}</span><span class="reviews-count">${item.reviews} отзывов</span></div><div class="card-title">${item.title}</div><div class="card-location"><i class="fas fa-map-marker-alt"></i> ${item.location}</div><div class="card-price">${item.price === 0 ? 'Индивидуальная цена' : 'от ' + item.price.toLocaleString() + ' ₽'}</div></div>`;
                card.dataset.rating = item.rating;
                card.dataset.price = item.price;
                card.dataset.location = item.location;
            }
            return card;
        }

        function getDetailCSS() {
            return `*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fcf7f3;padding:40px 20px;color:#1e1e2a;line-height:1.6}.container{max-width:900px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.08)}.carousel-container{position:relative;width:100%;height:400px;overflow:hidden}.carousel-slides{display:flex;transition:transform 0.5s;height:100%}.carousel-slide{min-width:100%;height:100%;background-size:contain;background-position:center;background-repeat:no-repeat;background-color:#000}.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.9);border:none;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:1.5rem;color:#6c1a30;display:flex;align-items:center;justify-content:center;z-index:10}.carousel-btn.prev{left:20px}.carousel-btn.next{right:20px}.carousel-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}.carousel-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.6);border:2px solid #6c1a30;cursor:pointer}.carousel-dot.active{background:#6c1a30}.carousel-counter{position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.6);color:#fff;padding:6px 12px;border-radius:20px;font-size:0.9rem;z-index:10}.content{padding:32px 40px 40px}h1{font-size:2.5rem;font-weight:700;color:#4a1022;margin-bottom:16px}.rating-info{display:flex;align-items:center;gap:12px;margin-bottom:20px}.stars{color:#ffd700;font-size:1.5rem;letter-spacing:4px}.rating-number{font-weight:700;color:#4a1022;background:#fff3cd;padding:4px 10px;border-radius:6px}.reviews{color:#6c757d}.desc{font-size:1.1rem;color:#4b5563;margin-bottom:24px}.custom-text{background:#fcf7f3;padding:20px;border-radius:12px;margin-bottom:24px;font-size:1.05rem;color:#2c3e50;border-left:4px solid #6c1a30}.divider{height:2px;background:#e5e7eb;margin:24px 0}.section-title{font-weight:700;font-size:1.2rem;text-transform:uppercase;letter-spacing:0.5px;color:#374151;margin-bottom:16px}.contact-info{margin-bottom:20px}.contact-info p{margin-bottom:8px;display:flex;align-items:center;gap:8px}.contact-info i{width:20px;color:#6c1a30}.program-list{list-style:none;padding:0}.program-list li{padding:8px 0;border-bottom:1px solid #f0f0f0}.reviews-list{margin-bottom:24px}.review{background:#fcf7f3;padding:16px;border-radius:12px;margin-bottom:12px}.review-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}.review-name{font-weight:700;color:#4a1022}.review-stars{color:#ffd700;letter-spacing:2px}.review-text{font-size:0.95rem;color:#4b5563;line-height:1.5}.add-review{background:#fff;padding:20px;border-radius:12px;border:1px solid #e8dbd3}.review-textarea{width:100%;min-height:100px;padding:12px;border:1px solid #e8dbd3;border-radius:8px;font-family:'Inter',sans-serif;font-size:1rem;resize:vertical;margin-bottom:12px}.review-rating{display:flex;align-items:center;gap:12px;margin-bottom:12px}.review-stars-input .star-input{cursor:pointer;font-size:1.5rem;color:#ddd;transition:color 0.2s;user-select:none}.review-stars-input .star-input.active{color:#ffd700}.submit-review{background:#6c1a30;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.3s}.submit-review:hover{background:#4a1022}.back-link{display:inline-block;margin-top:24px;color:#6c1a30;text-decoration:none;font-weight:500;cursor:pointer}.back-link:hover{color:#c62828}.price-info{font-weight:700;font-size:1.3rem;color:#6c1a30;margin-bottom:20px}`;
        }

        function getCarouselScript(totalSlides) {
            return `let currentSlide=0;const totalSlides=${totalSlides};const slides=document.getElementById('carousel-slides');const dots=document.querySelectorAll('.carousel-dot');const counter=document.getElementById('carousel-counter');function updateCarousel(){slides.style.transform='translateX(-'+(currentSlide*100)+'%)';dots.forEach(function(d,i){d.classList.toggle('active',i===currentSlide)});counter.textContent=(currentSlide+1)+' / '+totalSlides}function changeSlide(d){currentSlide+=d;if(currentSlide>=totalSlides)currentSlide=0;if(currentSlide<0)currentSlide=totalSlides-1;updateCarousel()}function goToSlide(i){currentSlide=i;updateCarousel()}setInterval(function(){changeSlide(1)},5000);let touchStartX=0;slides.addEventListener('touchstart',function(e){touchStartX=e.changedTouches[0].screenX});slides.addEventListener('touchend',function(e){const diff=touchStartX-e.changedTouches[0].screenX;if(Math.abs(diff)>50)changeSlide(diff>0?1:-1)});document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')changeSlide(-1);if(e.key==='ArrowRight')changeSlide(1)});let selectedReviewRating=0;document.querySelectorAll('.star-input').forEach(function(s){s.addEventListener('click',function(){selectedReviewRating=parseInt(this.dataset.rating);document.querySelectorAll('.star-input').forEach(function(st,i){st.textContent=i<selectedReviewRating?'★':'☆';st.classList.toggle('active',i<selectedReviewRating)})})});function submitReview(){const text=document.querySelector('.review-textarea').value.trim();if(!text){alert('Напишите отзыв!');return}if(selectedReviewRating===0){alert('Поставьте оценку!');return}const reviewsList=document.querySelector('.reviews-list');const starsHTML='★'.repeat(selectedReviewRating)+'☆'.repeat(5-selectedReviewRating);reviewsList.insertAdjacentHTML('afterbegin','<div class="review"><div class="review-header"><span class="review-name">Вы</span><span class="review-stars">'+starsHTML+'</span></div><p class="review-text">'+text+'</p></div>');document.querySelector('.review-textarea').value='';selectedReviewRating=0;document.querySelectorAll('.star-input').forEach(function(s){s.textContent='☆';s.classList.remove('active')})}`;
        }

        function fillSection(vg, hg, data, isRecipe) {
            const v = document.getElementById(vg), h = document.getElementById(hg);
            const handler = isRecipe ? openRecipeWindow : openDetailWindow;
            data.forEach(function(item, i) {
                const card = renderCard(item, handler, isRecipe);
                (i < 4 ? v : h).appendChild(card);
            });
        }

        fillSection('gastro-visible-grid', 'gastro-hidden-cards', gastroTours, false);
        fillSection('places-visible-grid', 'places-hidden-cards', places, false);
        fillSection('fest-visible-grid', 'fest-hidden-cards', festivals, false);
        fillSection('recipes-visible-grid', 'recipes-hidden-cards', recipes, true);

        function setupShowMore(b, h) {
            const btn = document.getElementById(b), hid = document.getElementById(h), sp = btn.querySelector('span'), ot = sp.textContent;
            btn.addEventListener('click', function() {
                hid.classList.toggle('show');
                btn.classList.toggle('expanded');
                sp.textContent = hid.classList.contains('show') ? 'Скрыть' : ot;
            });
        }

        setupShowMore('gastro-show-more', 'gastro-hidden-cards');
        setupShowMore('places-show-more', 'places-hidden-cards');
        setupShowMore('fest-show-more', 'fest-hidden-cards');
        setupShowMore('recipes-show-more', 'recipes-hidden-cards');

        updateCounts();

        const navItems = document.querySelectorAll('.nav-item');
        const sections = { gastro: document.getElementById('gastro'), places: document.getElementById('places'), fest: document.getElementById('fest'), recipes: document.getElementById('recipes') };
        
        navItems.forEach(function(item) {
            item.addEventListener('click', function() {
                const id = this.dataset.section;
                sections[id].scrollIntoView({ behavior: 'smooth' });
                navItems.forEach(function(i) { i.classList.toggle('active', i.dataset.section === id); });
            });
        });
        
        const obs = new IntersectionObserver(function(entries) { 
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    navItems.forEach(function(i) { i.classList.toggle('active', i.dataset.section === entry.target.id); });
                }
            });
        }, { threshold: 0.3 });
        
        Object.values(sections).forEach(function(section) { obs.observe(section); });
    })();
</script>
